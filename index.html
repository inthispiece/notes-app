<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>lrc神金笔记</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell" aria-label="lrc神金笔记">
      <aside class="sidebar" aria-label="笔记列表">
        <header class="sidebar-header">
          <div class="brand" aria-label="lrc神金笔记">
            <img class="brand-logo" src="assets/logo-bird.png" alt="简笔画鸟 logo">
            <h1>lrc神金笔记</h1>
          </div>
          <button class="icon-button primary" id="newNoteButton" type="button" aria-label="新建笔记" title="新建笔记">+</button>
        </header>
        <label class="search-box">
          <span class="visually-hidden">搜索笔记</span>
          <input id="searchInput" type="search" placeholder="搜索标题或内容" autocomplete="off">
        </label>
        <ul class="note-list" id="noteList" aria-label="笔记"></ul>
      </aside>

      <section class="editor" aria-label="笔记内容">
        <header class="editor-toolbar">
          <div class="status-group">
            <span id="noteCount">0 条笔记</span>
            <span id="saveStatus" aria-live="polite">已保存</span>
          </div>
          <div class="toolbar-actions">
            <button class="text-button" id="toggleSidebarButton" type="button" aria-pressed="false">隐藏侧栏</button>
            <button class="text-button handwriting-control" id="prevPageButton" type="button">上一页</button>
            <button class="page-indicator handwriting-control" id="pageIndicatorButton" type="button">1 / 1</button>
            <button class="text-button handwriting-control" id="nextPageButton" type="button">下一页</button>
            <button class="text-button handwriting-control" id="addPageButton" type="button">新页</button>
            <div class="color-picker handwriting-control">
              <button class="color-menu-button" id="colorMenuButton" type="button" aria-label="笔颜色" aria-expanded="false">
                <span id="colorSwatch" class="color-swatch" aria-hidden="true"></span>
              </button>
              <div class="color-palette" id="colorPalette" hidden>
                <button class="color-option" type="button" data-color="#1f2933" style="--color: #1f2933" aria-label="黑色"></button>
                <button class="color-option" type="button" data-color="#ef4444" style="--color: #ef4444" aria-label="红色"></button>
                <button class="color-option" type="button" data-color="#2563eb" style="--color: #2563eb" aria-label="蓝色"></button>
                <button class="color-option" type="button" data-color="#16a34a" style="--color: #16a34a" aria-label="绿色"></button>
                <button class="color-option" type="button" data-color="#7c3aed" style="--color: #7c3aed" aria-label="紫色"></button>
                <button class="color-option" type="button" data-color="#eef4ff" style="--color: #eef4ff" aria-label="白色"></button>
              </div>
            </div>
            <label class="pen-size-control handwriting-control" title="笔粗细">
              <span class="visually-hidden">笔粗细</span>
              <input id="penSizeInput" type="range" min="1" max="18" value="4" aria-label="笔粗细">
            </label>
            <button class="text-button handwriting-control active" id="ballpointButton" type="button" aria-pressed="true">圆珠笔</button>
            <button class="text-button handwriting-control" id="fountainPenButton" type="button" aria-pressed="false">钢笔</button>
            <button class="text-button handwriting-control" id="eraserButton" type="button" aria-pressed="false">橡皮</button>
            <button class="text-button handwriting-control" id="lassoButton" type="button" aria-pressed="false">套索</button>
            <button class="text-button handwriting-control" id="clearSelectionButton" type="button">清除选区</button>
            <button class="text-button handwriting-control" id="clearHandwritingButton" type="button">清空</button>
            <button class="text-button danger" id="deleteNoteButton" type="button">删除</button>
          </div>
        </header>

        <div class="editor-fields" id="editorFields">
          <input class="title-input" id="titleInput" type="text" placeholder="标题" aria-label="标题">
          <textarea class="content-input" id="contentInput" placeholder="开始记录..." aria-label="内容"></textarea>
          <section class="handwriting-panel" id="handwritingPanel" aria-label="手写内容" hidden>
            <canvas class="handwriting-canvas" id="handwritingCanvas" width="900" height="560" aria-label="手写画布"></canvas>
          </section>
        </div>

        <div class="empty-state" id="emptyState" hidden>
          <h2>选择或新建一条笔记</h2>
          <p>左侧会保存你的笔记列表，内容会自动存到浏览器本地。</p>
          <button class="text-button primary" id="emptyNewNoteButton" type="button">新建笔记</button>
        </div>
      </section>
    </main>

    <button class="theme-toggle" id="themeToggle" type="button" aria-label="切换为深色模式" title="切换为深色模式">
      <span class="theme-toggle-icon" aria-hidden="true">◐</span>
      <span id="themeToggleText">深色</span>
    </button>

    <div class="note-type-dialog" id="noteTypeDialog" role="dialog" aria-modal="true" aria-labelledby="noteTypeTitle" hidden>
      <div class="note-type-panel">
        <h2 id="noteTypeTitle">新建笔记</h2>
        <div class="note-type-actions">
          <button class="text-button primary note-type-button" type="button" data-note-type="text">文本笔记</button>
          <button class="text-button primary note-type-button" type="button" data-note-type="handwriting">手写笔记</button>
        </div>
        <button class="text-button" id="cancelNoteTypeButton" type="button">取消</button>
      </div>
    </div>

    <div class="note-type-dialog" id="deleteConfirmDialog" role="dialog" aria-modal="true" aria-labelledby="deleteConfirmTitle" hidden>
      <div class="note-type-panel">
        <h2 id="deleteConfirmTitle">删除笔记</h2>
        <p id="deleteConfirmText">确定删除这条笔记吗？</p>
        <div class="note-type-actions">
          <button class="text-button danger" id="confirmDeleteButton" type="button">删除</button>
          <button class="text-button" id="cancelDeleteButton" type="button">取消</button>
        </div>
      </div>
    </div>

    <div class="note-type-dialog" id="pageJumpDialog" role="dialog" aria-modal="true" aria-labelledby="pageJumpTitle" hidden>
      <div class="note-type-panel">
        <h2 id="pageJumpTitle">跳转页码</h2>
        <label class="page-jump-field">
          <span id="pageJumpHint">输入页码</span>
          <input id="pageJumpInput" type="number" min="1" step="1" inputmode="numeric">
        </label>
        <div class="note-type-actions">
          <button class="text-button primary" id="confirmPageJumpButton" type="button">跳转</button>
          <button class="text-button" id="cancelPageJumpButton" type="button">取消</button>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
